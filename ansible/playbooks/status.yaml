- name: Show infrastructure status
  hosts: pve
  gather_facts: false
  tasks:
    - name: Get VM status
      command: qm list
      register: vm_list
      changed_when: false

    - name: Get LXC status
      command: pct list
      register: lxc_list
      changed_when: false

    - name: Display VMs
      debug:
        msg: "{{ vm_list.stdout_lines }}"

    - name: Display LXCs
      debug:
        msg: "{{ lxc_list.stdout_lines }}"
