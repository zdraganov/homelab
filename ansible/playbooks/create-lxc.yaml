- name: Create LXC container
  hosts: pve
  gather_facts: false
  vars:
    id: ""
    hostname: ""
    memory: 2048
    cores: 2
    disk: 8
    ostemplate: "local:vztmpl/debian-12-standard_12.7-1_amd64.tar.zst"
    storage: "local-lvm"
    nesting: true
    onboot: true
    start_after: true
  tasks:
    - name: Validate input
      assert:
        that:
          - id | length > 0
          - hostname | length > 0
        fail_msg: "Usage: -e id=<vmid> -e hostname=<name> [-e memory=2048] [-e cores=2] [-e disk=8]"

    - name: Create LXC
      command: >
        pct create {{ id }} {{ ostemplate }}
        --hostname {{ hostname }}
        --memory {{ memory }}
        --cores {{ cores }}
        --rootfs {{ storage }}:{{ disk }}
        --net0 name=eth0,bridge=vmbr0,ip=dhcp,type=veth
        --features nesting={{ nesting | ternary('1','0') }}
        --onboot {{ onboot | ternary('1','0') }}
        --unprivileged 1
        --start {{ start_after | ternary('1','0') }}
      register: result

    - name: Show result
      debug:
        msg: "LXC {{ id }} ({{ hostname }}) created successfully"
