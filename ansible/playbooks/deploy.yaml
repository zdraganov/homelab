- name: Deploy stack to Dockge
  hosts: pve
  gather_facts: false
  vars:
    stack: ""
    dockge_lxc: 104
    stacks_dir: "{{ playbook_dir }}/../../stacks"
    secrets_dir: "{{ playbook_dir }}/../../secrets"
  tasks:
    - name: Validate input
      assert:
        that: stack | length > 0
        fail_msg: "Usage: -e stack=<name>"

    - name: Ensure stack directory exists
      command: "pct exec {{ dockge_lxc }} -- mkdir -p /opt/stacks/{{ stack }}"
      changed_when: false

    - name: Read local compose file
      set_fact:
        compose_content: "{{ lookup('file', stacks_dir + '/' + stack + '/compose.yaml') }}"

    - name: Push compose file
      copy:
        content: "{{ compose_content }}"
        dest: "/tmp/{{ stack }}-compose.yaml"
      changed_when: false

    - name: Copy compose into LXC
      command: "pct push {{ dockge_lxc }} /tmp/{{ stack }}-compose.yaml /opt/stacks/{{ stack }}/compose.yaml"

    - name: Check if secrets file exists
      delegate_to: localhost
      stat:
        path: "{{ secrets_dir }}/{{ stack }}.enc.yaml"
      register: secrets_file

    - name: Decrypt and push .env
      when: secrets_file.stat.exists
      block:
        - name: Decrypt secrets
          delegate_to: localhost
          command:
            cmd: "sops --decrypt {{ secrets_dir }}/{{ stack }}.enc.yaml"
          register: decrypted
          environment:
            SOPS_AGE_KEY_FILE: "{{ secrets_dir }}/age.key"

        - name: Build .env content
          set_fact:
            env_content: "{{ decrypted.stdout_lines | reject('match', '^#') | map('regex_replace', ': ', '=') | join('\n') }}"

        - name: Write .env to temp
          copy:
            content: "{{ env_content }}\n"
            dest: "/tmp/{{ stack }}.env"
          changed_when: false

        - name: Push .env into LXC
          command: "pct push {{ dockge_lxc }} /tmp/{{ stack }}.env /opt/stacks/{{ stack }}/.env"

    - name: Restart stack
      command: "pct exec {{ dockge_lxc }} -- bash -c 'cd /opt/stacks/{{ stack }} && docker compose up -d'"
      register: compose_result

    - name: Show result
      debug:
        msg: "{{ compose_result.stderr_lines }}"
      when: compose_result.stderr_lines | length > 0
