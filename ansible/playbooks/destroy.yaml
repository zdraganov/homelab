- name: Destroy VM/LXC
  hosts: pve
  gather_facts: false
  vars:
    id: ""
    confirm: "no"
  tasks:
    - name: Validate input
      assert:
        that:
          - id | length > 0
          - confirm == "yes"
        fail_msg: "Usage: -e id=<vmid> -e confirm=yes"

    - name: Stop LXC (if running)
      command: "pct stop {{ id }}"
      failed_when: false
      changed_when: false

    - name: Stop VM (if running)
      command: "qm stop {{ id }}"
      failed_when: false
      changed_when: false

    - name: Destroy LXC
      command: "pct destroy {{ id }} --purge"
      register: lxc_destroy
      failed_when: false

    - name: Destroy VM (fallback)
      command: "qm destroy {{ id }} --purge"
      when: lxc_destroy.rc != 0

    - name: Done
      debug:
        msg: "{{ id }} destroyed. Remember to remove it from inventory."
