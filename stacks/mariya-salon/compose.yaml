services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    image: ghcr.io/zdraganov/mariya_salon:migrate
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    image: ghcr.io/zdraganov/mariya_salon:latest
    ports:
      - "3010:3010"
    env_file:
      - .env
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  uploads:
    image: nginx:alpine
    ports:
      - "3011:80"
    volumes:
      - uploads:/usr/share/nginx/html/uploads:ro
    configs:
      - source: nginx_uploads
        target: /etc/nginx/conf.d/default.conf
    restart: unless-stopped

  cron:
    image: alpine:3.20
    depends_on:
      - app
    environment:
      - CALENDAR_SYNC_SECRET=${CALENDAR_SYNC_SECRET}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "*/5 * * * * wget -qO- --header='x-sync-secret: $${CALENDAR_SYNC_SECRET}' --post-data='' http://app:3010/api/admin/sync-calendar > /proc/1/fd/1 2>&1" | crontab -
        crond -f -l 2
    restart: unless-stopped

volumes:
  db-data:
  uploads:

configs:
  nginx_uploads:
    content: |
      server {
          listen 80;
          location /uploads/ {
              alias /usr/share/nginx/html/uploads/;
              expires 1y;
              add_header Cache-Control "public, immutable";
              add_header Access-Control-Allow-Origin "*";
          }
          location / {
              return 404;
          }
      }
